services:
  - type: web
    name: meeting-assistant-backend
    env: node
    # Instala dependências (incluindo dev) e compila apenas o backend
    buildCommand: pnpm install && pnpm --filter backend build
    # Inicia o backend usando o script definido no package.json raiz ou do app
    startCommand: pnpm --filter backend start
    envVars:
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: NODE_VERSION
        value: 22.22.0