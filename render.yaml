services:
  - type: web
    name: meeting-assistant-backend
    env: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter backend prisma:generate && pnpm --filter backend build
    startCommand: pnpm --filter backend start
    envVars:
      - key: NPM_CONFIG_PRODUCTION
        value: 'false'
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
